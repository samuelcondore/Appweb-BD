{% extends 'base.html' %}
{% block title %} Portada {% endblock %}
{% block css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/table.css') }}">
{% endblock %}

{% block content %}
<div style="display: grid; place-items: center;">
    <h1>Distribución de género según tipo de institución</h1>
    <div class="container-gen">
        <select id="institucion" style="grid-column: 1 / 3;">
            <option value="">Elige tipo de institución</option>
            <option value="Centros de Formación Técnica">Centros de Formación Técnica</option>
            <option value="Institutos Profesionales">Institutos Profesionales</option>
            <option value="Universidades Privadas CRUCH">Universidades Privadas CRUCH</option>
            <option value="Universidades Privadas">Universidades Privadas</option>
            <option value="Universidades Estatales CRUCH">Universidades Estatales CRUCH</option>
            <option value="Universidades (* Carrera en Convenio)">Universidades (* Carrera en Convenio)</option>
        </select>
        <table class="responsive-table" style="grid-column: 1 / 3;">
            <thead>
                <tr>
                    <th scope="col">Género</th>
                    <th scope="col">Total</th>
                    <th scope="col">Porcentaje</th>
                </tr>
            </thead>
            <tbody id="search_results">
                <tr>
                    <td style="text-align: center;" colspan="3" >Seleccione un tipo de institución</td>
                </tr>
            </tbody>
        </table> 
    </div>

</div>
{% endblock %}
{% block javascript %}
<script src="static/js/distr_genero.js"></script>
{% endblock %}
